version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # These names and this top-level location are part of docs/03-OS-CREATION.md.
    - PACKAGE_DIRECTORY_MATCH
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - SERVICE_SUFFIX
breaking:
  use:
    - FILE
